name: Scrape Products & Update Dashboard

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run scrapers
        run: |
          cd scrapers
          python run_all_scrapers.py
          ls -la output/

      - name: Embed data into dashboard
        run: |
          cp -r scrapers/output ./output || true
          python scrapers/embed_data.py

      - name: Push changes
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add -A
          git diff --staged --quiet || git commit -m "update products $(date '+%Y-%m-%d')"
          git push
