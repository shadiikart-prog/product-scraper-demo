name: Scrape Products & Update Dashboard

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: List files (debug)
        run: find . -name "*.py" | head -20

      - name: Run HDEW scraper
        run: |
          cd scrapers
          python scraper_hdew.py || python run_all_scrapers.py

      - name: Run embed
        run: |
          ls -la
          ls -la scrapers/ || true
          python scrapers/embed_data.py || python embed_data.py

      - name: Push changes
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add -A
          git diff --staged --quiet || git commit -m "update products $(date '+%Y-%m-%d')"
          git push
