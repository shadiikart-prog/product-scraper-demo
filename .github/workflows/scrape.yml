name: Scrape Products & Update Dashboard

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run scrapers
        timeout-minutes: 12
        run: |
          cd scrapers
          timeout 600 python run_all_scrapers.py || true
          echo "=== Output files ==="
          ls -la output/ || echo "No output folder"

      - name: Embed data into dashboard
        run: |
          mkdir -p output
          cp -r scrapers/output/. ./output/ 2>/dev/null || true
          echo "=== JSON files found ==="
          ls -la output/*.json || echo "No JSON files"
          python scrapers/embed_data.py

      - name: Show result
        run: |
          echo "=== Products in index.html ==="
          grep -o 'Site:"[^"]*"' index.html | wc -l

      - name: Push changes
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add index.html output/ || true
          git diff --staged --quiet || git commit -m "update products $(date '+%Y-%m-%d')"
          git push origin main
