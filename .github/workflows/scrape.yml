name: Scrape Products & Update Dashboard

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run scrapers
        timeout-minutes: 12
        run: |
          cd scrapers
          timeout 600 python run_all_scrapers.py || true
          ls -la output/ || echo "No output"

      - name: Embed data into dashboard
        run: |
          mkdir -p output
          cp -r scrapers/output/. ./output/ 2>/dev/null || true
          python scrapers/embed_data.py || true

      - name: Push changes
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git stash || true
          git fetch origin main
          git reset --hard origin/main
          git stash pop || true
          git add index.html
          git add output/ || true
          git diff --staged --quiet || git commit -m "update products $(date '+%Y-%m-%d')"
          git push origin main
